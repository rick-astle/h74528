<!DOCTYPE html>
<html>
<head>
    <title>Receiver</title>
    <script src="https://unpkg.com"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        video { width: 100vw; height: 100vh; object-fit: contain; }
    </style>
</head>
<body>
    <!-- Muted is mandatory for autoplay to work in 2024+ browsers -->
    <video id="remoteVideo" autoplay playsinline muted></video>
    <script>
        const peer = new Peer();
        const targetId = 'host-monitor-unique-id';

        peer.on('open', () => {
            // Attempt to connect to the broadcaster
            const call = peer.call(targetId, new MediaStream());
            
            call.on('stream', (remoteStream) => {
                const video = document.getElementById('remoteVideo');
                video.srcObject = remoteStream;
                
                // Force play to fix the black screen issue
                video.onloadedmetadata = () => {
                    video.play().catch(e => console.error("Playback failed:", e));
                };
            });
        });

        // Auto-reconnect if the connection is dropped
        peer.on('disconnected', () => peer.reconnect());
    </script>
</body>
</html>
