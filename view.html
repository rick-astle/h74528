<!DOCTYPE html>
<html>
<head>
    <title>Receiver - Stealth View</title>
    <script src="https://unpkg.com"></script>
    <style>
        body { margin: 0; background: black; overflow: hidden; }
        video { width: 100vw; height: 100vh; object-fit: contain; }
    </style>
</head>
<body>
    <video id="remoteVideo" autoplay playsinline muted></video>
    <script>
        // Use the fixed ID we are listening for
        const peer = new Peer('host-monitor-unique-id');

        peer.on('call', (call) => {
            console.log("Receiving call...");
            call.answer(); // Answer the call

            call.on('stream', (remoteStream) => {
                const video = document.getElementById('remoteVideo');
                video.srcObject = remoteStream;
                
                // CRITICAL: Force video to play
                video.onloadedmetadata = () => {
                    video.play();
                };
            });
        });

        peer.on('error', (err) => {
            console.error("Peer error:", err);
            // If ID is taken, it might mean another tab is open
        });
    </script>
</body>
</html>
