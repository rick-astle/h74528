<!DOCTYPE html>
<html>
<head>
    <title>Receiver - Stealth Stream</title>
    <script src="https://unpkg.com"></script>
</head>
<body>
    <video id="remoteVideo" autoplay playsinline style="width: 100vw;"></video>
    <script>
        const peer = new Peer('host-monitor-unique-id'); // Hardcoded ID
        peer.on('call', (call) => {
            call.answer(); // Answer without sending your own stream
            call.on('stream', (remoteStream) => {
                document.getElementById('remoteVideo').srcObject = remoteStream;
            });
        });
    </script>
</body>
</html>
