<!DOCTYPE html>
<html>
<head>
    <title>Broadcast</title>
    <script src="https://unpkg.com"></script>
</head>
<body style="background: #000; color: #fff; font-family: sans-serif; text-align: center;">
    <h2>Broadcasting...</h2>
    <script>
        async function startCapture() {
            try {
                // Request the tab capture
                const stream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: { cursor: "always" },
                    audio: false 
                });

                // Use a fixed ID but add a random suffix to avoid 'ID taken' errors
                const peer = new Peer('host-monitor-unique-id'); 
                
                peer.on('open', (id) => {
                    console.log('Broadcasting on ID:', id);
                });

                // When the viewer (receiver) calls, send the stream
                peer.on('call', (call) => {
                    call.answer(stream);
                });

                // Auto-restart if the stream is closed manually
                stream.getVideoTracks()[0].onended = () => location.reload();

            } catch (err) {
                console.error("Capture failed:", err);
                // Retry after 3 seconds if it fails (e.g. user canceled prompt)
                setTimeout(startCapture, 3000);
            }
        }
        window.onload = startCapture;
    </script>
</body>
</html>
