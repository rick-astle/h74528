<!DOCTYPE html>
<html>
<head>
    <title>Broadcast</title>
    <script src="https://unpkg.com"></script>
</head>
<body style="background: #000; color: #fff; text-align: center; font-family: sans-serif;">
    <h2>Status: <span id="status">Ready</span></h2>
    <script>
        async function startCapture() {
            const status = document.getElementById('status');
            try {
                // Request the tab capture
                const stream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: { cursor: "always" },
                    audio: false 
                });

                // Hardcoded ID for the host
                const peer = new Peer('host-monitor-unique-id'); 
                
                peer.on('open', (id) => {
                    status.innerText = "Broadcasting Live!";
                });

                // Listen for the receiver's call and send our screen stream
                peer.on('call', (call) => {
                    call.answer(stream);
                });

                // Auto-restart if capture is stopped
                stream.getVideoTracks()[0].onended = () => location.reload();

            } catch (err) {
                status.innerText = "Error: " + err.message;
                setTimeout(startCapture, 3000); // Retry if user cancels
            }
        }
        window.onload = startCapture;
    </script>
</body>
</html>
